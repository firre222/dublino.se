<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Case Clicker 2 | Dublino</title>
    <link rel="icon" href="/images/caseclicker.webp">
    <meta name="robots" content="noindex, nofollow, noodp, noydir">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", "Calibri Light", Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            max-width: 100vw;
            height: 100%;
            max-height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-iframe {
            display: none;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://csgo.mtsl.dk/" allowfullscreen></iframe>
        <noscript>
            <div class="no-iframe">Your browser does not support iframes. Please enable JavaScript or visit the link directly: 
                <a href="https://csgo.mtsl.dk/" target="_blank">https://csgo.mtsl.dk/</a>
            </div>
        </noscript>
    </div>
</body>
</html>
